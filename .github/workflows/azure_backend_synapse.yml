name: Deploy Synapse Backend to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "packages/services/legacy-api/**"
      - ".github/workflows/azure_backend_synapse.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "packages/services/legacy-api/package-lock.json"

      - name: Install backend dependencies
        working-directory: packages/services/legacy-api
        run: npm ci

      - name: Build backend
        working-directory: packages/services/legacy-api
        run: npm run build

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: synapse-backend
          path: packages/services/legacy-api

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: synapse-backend
          path: ./synapse-backend

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_157CF5CE5A294441922C8CCCB611F137 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_3F9422E8F91E4CE1928F8C5B275FBE28 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_326F73C8C25C4C66A7A81D56694DA301 }}

      - name: Deploy backend to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "synapse-backend-ds2026"
          slot-name: "Production"
          package: ./synapse-backend
