<!doctype html>
<html lang="pt-BR">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Synapse</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="description" content="Synapse — Sistema de Gestão Empresarial" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Synapse" />
    <script>
      (function () {
        var KEY = "synapse-module-load-recover-once";
        window.addEventListener("error", function (event) {
          var target = event && event.target;
          var isModuleScriptError =
            target &&
            target.tagName === "SCRIPT" &&
            String(target.type || "").indexOf("module") >= 0;
          if (!isModuleScriptError) return;
          try {
            if (sessionStorage.getItem(KEY) === "1") return;
            sessionStorage.setItem(KEY, "1");
          } catch (_) {}
          var hasQuery = location.href.indexOf("?") >= 0;
          var sep = hasQuery ? "&" : "?";
          location.replace(location.href + sep + "v=" + Date.now());
        }, true);
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      (function () {
        var KEY = "synapse-bootstrap-recover-once";
        window.addEventListener("error", function (event) {
          var message = String((event && event.message) || "");
          var chunkLike =
            message.indexOf("Loading chunk") >= 0 ||
            message.indexOf("Failed to fetch dynamically imported module") >= 0 ||
            message.indexOf("is not defined") >= 0;
          if (!chunkLike) return;
          try {
            if (sessionStorage.getItem(KEY) === "1") return;
            sessionStorage.setItem(KEY, "1");
          } catch (_) {}
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function (regs) {
              return Promise.all(regs.map(function (r) { return r.unregister(); }));
            }).finally(function () { location.reload(); });
            return;
          }
          location.reload();
        }, true);

        window.addEventListener("load", function () {
          try { sessionStorage.removeItem(KEY); } catch (_) {}
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
