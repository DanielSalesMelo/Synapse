[phases.install]
cmds = ["npm install", "cd packages/services/legacy-api && npm install"]

[phases.build]
cmds = [
  "npm run build",
  "cd packages/services/legacy-api && npm run build",
  "cp -r packages/services/legacy-api/agent packages/services/legacy-api/dist/../agent 2>/dev/null || true"
]

[start]
cmd = "cd packages/services/legacy-api && node dist/index.js"
